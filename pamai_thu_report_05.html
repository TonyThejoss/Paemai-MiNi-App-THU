<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>รายงานแจ้งลา & ขาดล็อค — แพไม้มินิ</title>
<style>
:root{
  --g:#7c2d12;--gm:#c2410c;--gb:#ea580c;--gl:#ffedd5;--gll:#fff7ed;
  --r:#b91c1c;--rl:#fee2e2;--pu:#6d28d9;--pul:#f5f3ff;
  --bg:#eef2f0;--sf:#fff;--sf2:#f4f8f5;--bd:#d0ddd5;--bd2:#a8c0b0;
  --tx:#0a1a10;--txm:#2e4a38;--txl:#6b8c76;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:13px;}
.toolbar{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--g),var(--gm));color:#fff;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.toolbar h1{font-size:.86rem;font-weight:800;}
.toolbar p{font-size:.62rem;opacity:.75;}
.tb-actions{display:flex;gap:8px;}
.tb-btn{padding:7px 14px;border:none;border-radius:8px;font-size:.74rem;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;}
.tb-btn.print{background:#fff;color:var(--gm);}
.tb-btn.back{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.3);}
.tb-btn.refresh{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.3);}
.page{max-width:920px;margin:18px auto;background:#fff;padding:26px 30px;border-radius:10px;box-shadow:0 2px 16px rgba(0,0,0,.08);}
.r-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--gm);padding-bottom:12px;margin-bottom:14px;}
.r-brand{font-size:1.05rem;font-weight:800;color:var(--g);}
.r-sub{font-size:.68rem;color:var(--txl);margin-top:1px;}
.r-meta{text-align:right;font-size:.66rem;color:var(--txl);}
.date-filter{display:flex;align-items:center;gap:8px;margin-bottom:14px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;}
.date-filter label{font-size:.7rem;font-weight:700;color:var(--txm);}
.date-filter input{padding:5px 8px;border:1.5px solid var(--bd);border-radius:6px;font-size:.74rem;font-family:inherit;}
.date-filter button{padding:5px 12px;background:var(--gm);color:#fff;border:none;border-radius:6px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;}
.kgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0;}
.kc{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:9px 8px;text-align:center;}
.kc .n{font-size:1.2rem;font-weight:800;color:var(--pu);}
.kc.r .n{color:var(--r);}
.kc .l{font-size:.6rem;color:var(--txl);margin-top:2px;}
.r-title{font-size:.86rem;font-weight:800;margin:16px 0 6px;padding-bottom:5px;border-bottom:1.5px solid var(--bd);}
table{width:100%;border-collapse:collapse;font-size:.7rem;margin-bottom:14px;}
th{background:var(--g);color:#fff;padding:5px 6px;text-align:left;font-size:.6rem;text-transform:uppercase;}
td{padding:5px 6px;border-bottom:1px solid var(--bd);}
tbody tr:nth-child(even) td{background:var(--sf2);}
.status-leave{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.6rem;font-weight:800;background:var(--pul);color:var(--pu);}
.status-absent{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.6rem;font-weight:800;background:var(--rl);color:var(--r);}
.status-cancel{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.6rem;font-weight:800;background:var(--sf2);color:var(--txl);}
.foot{text-align:center;font-size:.6rem;color:var(--txl);margin-top:18px;padding-top:10px;border-top:1px solid var(--bd);}
.warn{background:#fffbeb;border:1.5px solid #92400e;border-radius:8px;padding:8px 12px;font-size:.7rem;color:#92400e;font-weight:700;margin-bottom:14px;}
.empty{text-align:center;padding:24px;color:var(--txl);font-size:.78rem;}
.loading{text-align:center;padding:40px;color:var(--txl);font-size:.85rem;}
@media print{
  body{background:#fff;}
  .toolbar,.date-filter button{display:none;}
  .page{box-shadow:none;margin:0;max-width:100%;padding:0;border-radius:0;}
  @page{size:A4 portrait;margin:14mm;}
}

.ic{width:1em;height:1em;vertical-align:-.15em;display:inline-block;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ic-dot{stroke:none}
</style>
</head>
<body>

<div class="toolbar">
  <div>
    <h1><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="18" rx="2"/><path d="M9 3h6a1 1 0 0 1 1 1v1H8V4a1 1 0 0 1 1-1Z"/></svg> รายงานแจ้งลา & ขาดล็อค</h1>
    <p>แพไม้มินิ วันพฤหัสบดี · ข้อมูลสด จาก Google Sheets</p>
  </div>
  <div class="tb-actions">
    <button class="tb-btn refresh" onclick="render()"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.3 6.4L3 16"/><path d="M3 12a9 9 0 0 1 15.3-6.4L21 8"/><polyline points="3 20 3 16 7 16"/><polyline points="21 4 21 8 17 8"/></svg> รีเฟรช</button>
    <button class="tb-btn back" onclick="window.close()"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><line x1="20" y1="12" x2="4" y2="12"/><polyline points="10 6 4 12 10 18"/></svg> ปิด</button>
    <button class="tb-btn print" onclick="window.print()"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>️ พิมพ์ / บันทึกเป็น PDF</button>
  </div>
</div>

<div class="page">
  <div class="r-head">
    <div>
      <div class="r-brand">แพไม้มินิ — Pamai Market</div>
      <div class="r-sub">โทร 082-581-1144 · รายงานแจ้งลา & ขาดล็อคประจำวัน</div>
    </div>
    <div class="r-meta">
      <div>วันที่ออกรายงาน: <strong id="r-date">—</strong></div>
      <div>— ข้อมูลภายในเท่านั้น —</div>
    </div>
  </div>

  <div class="date-filter">
    <label>เลือกวันที่:</label>
    <input type="date" id="dateInput">
    <button onclick="render()"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> ดูข้อมูล</button>
  </div>

  <div id="dataWarn"></div>
  <div id="reportBody" class="loading">⏳ กำลังโหลดข้อมูลจาก Google Sheets...</div>

  <div class="foot">จัดทำโดย: ระบบบริหารจัดการแพไม้มินิ · พิมพ์เมื่อ <span id="r-stamp">—</span></div>
</div>

<script>
const MONS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function nowTH(){const n=new Date();return n.getDate()+' '+MONS[n.getMonth()]+' '+(n.getFullYear()+543);}
function dateToTH(dateStr){
  const n=new Date(dateStr+'T00:00:00');
  return n.getDate()+' '+MONS[n.getMonth()]+' '+(n.getFullYear()+543);
}

// ═══ AUTO-CONNECT v1.3: เชื่อมต่อ Google Sheets อัตโนมัติผ่านลิงก์ตั้งค่า (ตั้งครั้งเดียวต่อเครื่อง/เบราว์เซอร์) ═══
// เปิดผ่านลิงก์พิเศษที่มี ?api=URL ต่อท้าย (ส่งให้พนักงานทางแชทภายใน ไม่เผยแพร่ในซอร์สโค้ดสาธารณะ)
// ระบบจะบันทึกอัตโนมัติแล้วลบพารามิเตอร์ออกจาก URL ทันที ครั้งต่อไปไม่ต้องกดซ้ำ (อ่านจาก localStorage เหมือนเดิม)
(function(){
  try{
    var p=new URLSearchParams(location.search);
    var apiParam=p.get('api');
    if(apiParam){
      localStorage.setItem('pm-thu-api-url',decodeURIComponent(apiParam));
      p.delete('api');
      var clean=location.pathname+(p.toString()?('?'+p.toString()):'')+location.hash;
      history.replaceState(null,'',clean);
    }
  }catch(e){}
})();
function getApiUrl(){return (localStorage.getItem('pm-thu-api-url')||localStorage.getItem('pm-api-url'))||'';}
function getApiToken(){return (localStorage.getItem('pm-thu-api-token')||localStorage.getItem('pm-api-token'))||'';}
async function apiGet(action,params={}){
  const url=getApiUrl(); if(!url) return null;
  try{
    const r=await fetch(url+'?'+new URLSearchParams({action,token:getApiToken(),...params}));
    const j=await r.json();
    return j.status==='ok'?j.data:null;
  }catch(e){ console.error('apiGet error:',action,e); return null; }
}

const todayISO = new Date().toISOString().split('T')[0];
document.getElementById('dateInput').value = todayISO;

const STATUS_LABEL = { leave:'<svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="18" rx="2"/><path d="M9 3h6a1 1 0 0 1 1 1v1H8V4a1 1 0 0 1 1-1Z"/></svg> แจ้งลา', absent:'<svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> ขาดล็อค (ไม่แจ้ง)', cancel:'<svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg> ยกเลิกสถานะ' };
const STATUS_CLASS = { leave:'status-leave', absent:'status-absent', cancel:'status-cancel' };

async function render(){
  document.getElementById('r-date').textContent = nowTH();
  document.getElementById('r-stamp').textContent = nowTH() + ' ' + new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('reportBody').innerHTML = '<div class="loading">⏳ กำลังโหลดข้อมูลจาก Google Sheets...</div>';
  document.getElementById('dataWarn').innerHTML = '';

  if(!getApiUrl()){
    document.getElementById('dataWarn').innerHTML =
      '<div class="warn"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> ยังไม่ได้เชื่อมต่อ Google Sheets — กรุณาตั้งค่าที่หน้าหลักของระบบก่อน</div>';
    document.getElementById('reportBody').innerHTML = '';
    return;
  }

  const dateInput = document.getElementById('dateInput').value;
  const dateTH = dateInput ? dateToTH(dateInput) : nowTH();

  const leaveLog = await apiGet('getLeaveLog', {date: dateTH}) || [];

  // นับเฉพาะรายการที่ยังเป็นสถานะปัจจุบัน (ไม่ใช่ cancel) สำหรับ KPI
  const activeRecords = leaveLog.filter(r=>r.type==='leave'||r.type==='absent');
  const leaveCount = leaveLog.filter(r=>r.type==='leave').length;
  const absentCount = leaveLog.filter(r=>r.type==='absent').length;

  let html = `
  <div class="kgrid">
    <div class="kc"><div class="n">${leaveCount}</div><div class="l">รายการแจ้งลา</div></div>
    <div class="kc r"><div class="n">${absentCount}</div><div class="l">รายการขาดล็อค</div></div>
    <div class="kc"><div class="n">${leaveLog.length}</div><div class="l">รายการทั้งหมด (รวมยกเลิก)</div></div>
  </div>
  <div class="r-title">รายการแจ้งลา / ขาดล็อค — ${dateTH}</div>`;

  if(leaveLog.length === 0){
    html += '<div class="empty">ไม่มีรายการแจ้งลาหรือขาดล็อคในวันที่เลือก</div>';
  } else {
    html += `<table>
      <thead><tr><th style="width:24px">#</th><th>ล็อค</th><th>โซน</th><th>สินค้า</th><th>ผู้บันทึก</th><th style="width:120px">สถานะ</th><th style="width:60px">เวลา</th><th>หมายเหตุ</th></tr></thead>
      <tbody>`;
    // เรียงล่าสุดก่อน
    const sorted=[...leaveLog].sort((a,b)=>String(b.created_at||b.time).localeCompare(String(a.created_at||a.time)));
    sorted.forEach((r,i)=>{
      const cls = STATUS_CLASS[r.type]||'status-cancel';
      const lbl = STATUS_LABEL[r.type]||r.type;
      html += `<tr><td>${i+1}</td><td><strong>${r.lock_id||'—'}</strong></td><td>${r.zone||'—'}</td><td>${r.shop||'—'}</td><td>${r.manager||'—'}</td><td><span class="${cls}">${lbl}</span></td><td>${r.time||'—'}</td><td>${r.note||'—'}</td></tr>`;
    });
    html += '</tbody></table>';
  }

  document.getElementById('reportBody').innerHTML = html;
}
render();
</script>
</body>
</html>
